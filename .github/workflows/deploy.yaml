name: Deploy ChatOps Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REPO_URL: https://github.com/MajedSaade/chatOps.git
  REPO_NAME: chatOps

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ubuntu
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key
          cat > ~/.ssh/config << EOF
          Host my-ec2
            HostName $EC2_HOST
            User $EC2_USERNAME
            IdentityFile ~/.ssh/private_key
            StrictHostKeyChecking no
          EOF

      - name: Clone or Pull Code on EC2
        run: |
          ssh my-ec2 "if [ -d ~/${REPO_NAME} ]; then
                       cd ~/${REPO_NAME} && git remote set-url origin ${REPO_URL} && git pull origin main;
                     else
                       git clone ${REPO_URL} ~/${REPO_NAME};
                     fi"

      - name: Install System Dependencies on EC2
        run: |
          # Ensures the venv module is installed to prevent 'ensurepip' errors
          ssh my-ec2 "sudo apt-get update && sudo apt-get install -y python3-venv"

      - name: Run Deployment Script on EC2
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          ssh my-ec2 "export DISCORD_TOKEN=\"$DISCORD_TOKEN\" && cd ~/${REPO_NAME} && bash ./deploy.sh"