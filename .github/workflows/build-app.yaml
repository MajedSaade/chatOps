name: Build App Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        id: build
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required"
            exit 1
          fi

          IMAGE_REPO="${DOCKERHUB_REPOSITORY:-discordapp}"
          IMAGE_TAG="${{ github.run_number }}"
          IMAGE_NAME="${DOCKERHUB_USERNAME}/${IMAGE_REPO}:${IMAGE_TAG}"

          echo "Building Docker image: ${IMAGE_NAME}"
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

          docker build -t "${IMAGE_NAME}" .
          docker push "${IMAGE_NAME}"

          echo "image=/${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Successfully built and pushed: ${IMAGE_NAME}"

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-app.yaml
    with:
      image: ${{ needs.build.outputs.image }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}