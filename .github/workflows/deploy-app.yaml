name: Deploy App

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/discordapp-deploy

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.app.yaml"
          target: "~/discordapp-deploy"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMG_NAME: ${{ secrets.DOCKERHUB_USERNAME }}${{ inputs.image }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'default' }}
          LLM_AGENT_URL: ${{ vars.LLM_AGENT_URL || 'http://127.0.0.1:11434' }}
          LLM_AGENT_TIMEOUT: ${{ vars.LLM_AGENT_TIMEOUT || '120' }}
          STATUS_SERVER_PORT: ${{ vars.STATUS_SERVER_PORT || '8443' }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMG_NAME,DISCORD_BOT_TOKEN,KUBE_NAMESPACE,LLM_AGENT_URL,LLM_AGENT_TIMEOUT,STATUS_SERVER_PORT,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail

            # 1. Check for Docker and install the OFFICIAL version if missing
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing official Docker Engine..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo systemctl enable --now docker
            fi

            cd ~/discordapp-deploy

            # 2. Rename the copied file so docker compose recognizes it automatically
            mv docker-compose.app.yaml docker-compose.yml || true

            # 3. Generate .env file securely on the server
            cat > .env << EOL
            IMG_NAME=${IMG_NAME}
            ENVIRONMENT=production
            DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
            KUBE_NAMESPACE=${KUBE_NAMESPACE}
            LLM_AGENT_URL=${LLM_AGENT_URL}
            LLM_AGENT_TIMEOUT=${LLM_AGENT_TIMEOUT}
            STATUS_SERVER_PORT=${STATUS_SERVER_PORT}
            EOL

            # 4. Log into Docker Hub
            echo "${DOCKERHUB_TOKEN}" | sudo docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            # 5. Pull updates and restart gracefully
            sudo -E docker compose down --remove-orphans || true
            sudo -E docker compose pull
            sudo -E docker compose up -d
            sudo docker image prune -f

            echo "Deployment completed successfully!!"